<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}BIST Market Monitor Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='dashboard.css') }}">
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
    {% block head %}{% endblock %}
  </head>
  <body>
    <header class="topbar">
      <div class="brand-group">
        <a class="brand" href="/">
          <span class="brand-mark" aria-hidden="true">BT</span>
          <span>
            <span class="brand-title">BIST Market Monitor</span>
            <span class="tagline">IPO ceiling-break monitoring dashboard</span>
          </span>
        </a>
      </div>
      <nav class="nav" aria-label="Dashboard navigation">
        <a class="{% if request.url.path == '/' %}active{% endif %}" href="/">Dashboard</a>
        <a class="{% if request.url.path == '/alerts' %}active{% endif %}" href="/alerts">
          Recent alerts
        </a>
        <a class="{% if request.url.path == '/system' %}active{% endif %}" href="/system">
          System status
        </a>
      </nav>
    </header>

    <main class="page">
      {% block content %}{% endblock %}
    </main>

    <footer class="footer">
      Not investment advice. Monitoring and alerting only. No automatic trading.
    </footer>
  </body>
</html>
