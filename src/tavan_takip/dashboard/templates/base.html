<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}BIST Market Monitor Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='dashboard.css') }}">
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
    {% block head %}{% endblock %}
  </head>
  <body>
    <header class="topbar">
      <div>
        <a class="brand" href="/">BIST Market Monitor</a>
        <p class="tagline">IPO ceiling-break monitoring dashboard</p>
      </div>
      <nav class="nav" aria-label="Dashboard navigation">
        <a href="/">Dashboard</a>
        <a href="/alerts">Recent alerts</a>
        <a href="/system">System status</a>
      </nav>
    </header>

    <main class="page">
      {% block content %}{% endblock %}
    </main>

    <footer class="footer">
      Not investment advice. Monitoring and alerting only. No automatic trading.
    </footer>
  </body>
</html>
