{% for symbol in symbols %}
<tr>
  <td><strong>{{ symbol.symbol }}</strong></td>
  <td>{{ symbol.consecutive_ceiling_days }}</td>
  <td><span class="pill">{{ symbol.lifecycle_status }}</span></td>
  <td><span class="pill mode-{{ symbol.monitoring_mode }}">{{ symbol.monitoring_mode }}</span></td>
  <td>{{ symbol.last_processed_trading_date }}</td>
  <td><span class="pill alert-{{ symbol.alert_status }}">{{ symbol.alert_status }}</span></td>
</tr>
{% else %}
<tr>
  <td colspan="6" class="empty-state">No symbols configured.</td>
</tr>
{% endfor %}
